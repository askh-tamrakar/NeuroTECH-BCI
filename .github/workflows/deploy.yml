name: Deploy App to cPanel

on:
  push:
    branches:
      - master
      - develop
      - Test-WebApplication

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # FRONTEND DEPLOYMENT
      # -------------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci

      - name: Build React App
        run: cd frontend && npm run build

      - name: Deploy Frontend via SSH
        uses: easingthemes/ssh-deploy@v5.0.1
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.CPANEL_HOST }}
          REMOTE_USER: ${{ secrets.CPANEL_USER }}
          SOURCE: "frontend/dist/"
          TARGET: ${{ secrets.CPANEL_PATH }}
          ARGS: "-avz --delete"
          SSH_ARGS: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=no"

      # -------------------------------------------------------------------------
      # BACKEND DEPLOYMENT
      # -------------------------------------------------------------------------
      - name: Prepare Backend Artifacts
        run: |
          cp requirements.txt backend/
          # If you have a .env.example or other root files needed, copy them here too

      - name: Deploy Backend via SSH
        uses: easingthemes/ssh-deploy@v5.0.1
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.CPANEL_HOST }}
          REMOTE_USER: ${{ secrets.CPANEL_USER }}
          SOURCE: "backend/"
          # Using the secret name provided by the user
          TARGET: ${{ secrets.CPANEL_PATH_BACKEND }}
          # Exclude strictly local/dev files if necessary, though .gitignore usually handles it.
          # We do NOT want to delete everything on the remote if it contains virtualenvs or tmp files
          # but normally sync deletes extraneously. 
          # PRO TIP: Exclude 'venv' or 'virtualenv' if the user stores it in the same dir (bad practice but common).
          # For now, standard sync.
          ARGS: "-avz --delete" 
          SSH_ARGS: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=no"

      - name: Install Dependencies & Restart Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.CPANEL_PATH_BACKEND }}
            /usr/bin/pip install --user -r requirements.txt
            mkdir -p tmp
            touch tmp/restart.txt
